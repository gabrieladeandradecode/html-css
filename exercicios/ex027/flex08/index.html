<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        
        div.conteiner {
            display: flex;
            background-color: blueviolet;
            height: 400px;
            align-items: flex-start;
        }

        div.item {
            padding: 40px;
            text-align: center;
            background-color: cyan;
            border: 1px solid black;
        }

        div#id1 {
            align-self: flex-end;
        }
        div#id2 {
            align-self: center;
        }
        div#id3 {
            align-self: flex-start;
        }
        div#id4 {
            align-self: stretch;
        }
        div#id5 {
            align-self: auto;
        }
        div#id6 {
            align-self: flex-end;
        }
        div#id7 {
            align-self: inherit;
        }
    </style>
</head>
<body>
    <h1>Flexible Box</h1>

    <div class="conteiner">
        <div class="item" id="id1">A</div>
        <div class="item" id="id2">B</div>
        <div class="item" id="id3">C</div>
        <div class="item" id="id4">D</div>
        <div class="item" id="id5">E</div>
        <div class="item" id="id6">F</div>
        <div class="item" id="id7">G</div>
    </div>
</body>
</html>
