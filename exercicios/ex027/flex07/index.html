<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body {
            font-size: 24px;
        }
        div.conteiner {
            display: flex;
            background-color: blueviolet;
        }

        div.item {
            flex: auto;
            text-align: center;
            background-color: cyan;
            border: 1px solid black;
        }

        div#id1 {
            order: 10;
        }
        div#id2 {
            order: -5;
        }
        div#id3 {
            order: -8;
        }
        div#id4 {
            order: 3;
        }
        div#id5 {
            order: 2;
        }
        div#id6 {
            order: 0;
        }
        div#id7 {
            order: 0;
        }
    </style>
</head>
<body>
    <h1>Flexible Box</h1>

    <div class="conteiner">
        <div class="item" id="id1">A</div>
        <div class="item" id="id2">B</div>
        <div class="item" id="id3">C</div>
        <div class="item" id="id4">D</div>
        <div class="item" id="id5">E</div>
        <div class="item" id="id6">F</div>
        <div class="item" id="id7">G</div>
    </div>
</body>
</html>
