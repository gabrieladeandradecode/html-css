<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body {
            font-size: 24px;
        }

        div.conteiner {
            display: flex;
            background-color: blueviolet;
            flex-flow: row nowrap;
        }

        div.item {
            flex: auto;
            text-align: center;
            background-color: cyan;
            border: 1px solid black;
            flex-basis: 200px;
        }

        #cxA {
            flex-shrink: 0;
            flex-grow: 1;
        }

        #cxB {
            flex-shrink: 1;
            flex-grow: 1;
        }
        
        #cxB {
            flex-shrink: 8;
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <h1>Flexible Box</h1>

    <div class="conteiner">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
        
    </div>
</body>
</html>
